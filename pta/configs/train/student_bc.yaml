# Student behavior cloning config
stage: student_bc

env:
  config: pta/configs/env/scoop_transfer/id.yaml
  num_envs: 32
  observation_type: student  # non-privileged observations

teacher:
  checkpoint: checkpoints/teacher/best.pt

algorithm:
  name: bc
  learning_rate: 1.0e-4
  batch_size: 256
  epochs: 100

distillation:
  type: behavior_cloning
  action_loss_weight: 1.0
  feature_loss_weight: 0.1  # match teacher features

training:
  total_demonstrations: 100_000
  eval_freq: 10_000
  save_freq: 20_000
  seed: 42

finetune:
  enabled: true
  algorithm: ppo
  learning_rate: 1.0e-4
  total_timesteps: 2_000_000

checkpoint:
  dir: checkpoints/student
  name_format: "scoop_transfer_student_{step}"
